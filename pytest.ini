[pytest]
# brain-base pytest configuration.
#
# Layout:
#   tests/smoke/    — offline smoke tests (CLI JSON contracts, fast, no external deps)
#   tests/unit/     — pure unit tests for in-process logic (graphs / nodes / routing)
#   tests/e2e/      — end-to-end tests requiring real LLM / Milvus / Playwright
#   tests/probes/   — diagnostic / investigation scripts (NOT collected by pytest)
#
# Usage:
#   pytest                              — default suite (smoke + unit + LLM tests, no Milvus)
#                                         — LLM tests REAL-CALL Minimax/GLM (CLAUDE.md 规则 14)
#                                         — 缺 key 会 fail 不是 skip
#   pytest tests/smoke -q               — quick offline suite (<2s)
#   pytest tests/unit -q                — in-process unit tests + LLM 节点语义验证
#   pytest -m requires_milvus           — Milvus-backed tests only (needs live Milvus)
#   pytest -m "requires_llm and requires_milvus"  — full e2e

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 探针脚本目录禁止被 pytest 递归（脚本本身命名为 probe / *_probe.py 已避开 test_*.py 收集，
# 但仍显式排除一遍，防止以后有人不小心把探针起名 test_ 开头）。
norecursedirs = tests/probes

markers =
    offline: smoke tests that do not touch Milvus or the network
    requires_milvus: tests that require a live Milvus instance (skipped by default)
    requires_llm: tests that hit real LLM API; **NOT auto-skipped** (CLAUDE.md 规则 14: LLM 测试是核心必跑)。跑前在 .env 配 MINIMAX_API_KEY / GLM_API_KEY / BB_LLM_API_KEY 任一；缺 key 应 fail 不应 skip。
    slow: tests that take >2s to run

# CLAUDE.md 规则 14：LLM 测试不再默认跳过（默认 provider Minimax）。只跳 Milvus。
addopts = -ra -m "not requires_milvus"
